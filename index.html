<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Для Малахат!</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div id="matrix-screen" class="screen active">
        <canvas id="matrix-canvas"></canvas>
        <div id="matrix-content">
            <div id="vertical-text">
                H A P P Y<br>B I R T H<br>D A Y<br><br>M A L A K H A T
            </div>
            <div id="countdown" class="hidden"></div>
        </div>
    </div>

    <div id="gallery-screen" class="screen hidden">
        <div class="card" onclick="nextPhoto()">
            <img id="main-photo" src="images/1.jpeg" alt="Фото">
            <p>Нажми на фото, чтобы листать ➡️</p>
        </div>
    </div>

    <div id="heart-screen" class="screen hidden">
        <h2>Мое сердце принадлежит тебе ❤️</h2>
        <div class="heart-collage">
            <img src="images/1.jpeg">
            <img src="images/2.jpeg">
            <img src="images/3.jpeg">
            <img src="images/4.jpeg">
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
