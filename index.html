<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Для Малахат! ❤️</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div id="matrix-screen" class="screen active">
        <canvas id="matrix-canvas"></canvas>
        <div id="matrix-content">
            <div id="matrix-text">H A P P Y</div>
        </div>
    </div>

    <div id="gallery-screen" class="screen hidden">
        <div class="book-container">
            <div class="book" id="book" onclick="turnPage()">
                
                <div class="page" id="p1">
                    <div class="front">
                        <div class="page-content">
                            <img src="images/1.jpeg" alt="Фото 1">
                        </div>
                        <div class="page-footer">Нажми, чтобы открыть 📖</div>
                    </div>
                    <div class="back">
                        <div class="page-content">
                            <img src="images/2.jpeg" alt="Фото 2">
                        </div>
                        <div class="page-footer">Листаем дальше ➡️</div>
                    </div>
                </div>

                <div class="page" id="p2">
                    <div class="front">
                        <div class="page-content">
                            <img src="images/3.jpeg" alt="Фото 3">
                        </div>
                        <div class="page-footer">Еще один клик ➡️</div>
                    </div>
                    <div class="back">
                        <div class="page-content">
                            <img src="images/4.jpeg" alt="Фото 4">
                        </div>
                        <div class="page-footer font-surprise">Посмотреть сюрприз ❤️</div>
                    </div>
                </div>

            </div>
        </div>
    </div>

    <div id="heart-screen" class="screen hidden">
        <h2>Мое сердце принадлежит тебе ❤️</h2>
        <div class="heart-mosaic">
            <div class="cell empty"></div>
            <img src="images/1.jpeg" class="cell photo" alt="h1">
            <div class="cell empty"></div>
            <img src="images/2.jpeg" class="cell photo" alt="h2">
            <div class="cell empty"></div>

            <img src="images/3.jpeg" class="cell photo" alt="h3">
            <img src="images/4.jpeg" class="cell photo" alt="h4">
            <img src="images/1.jpeg" class="cell photo" alt="h5">
            <img src="images/2.jpeg" class="cell photo" alt="h6">
            <img src="images/3.jpeg" class="cell photo" alt="h7">

            <img src="images/4.jpeg" class="cell photo" alt="h8">
            <img src="images/1.jpeg" class="cell photo" alt="h9">
            <img src="images/2.jpeg" class="cell photo" alt="h10">
            <img src="images/3.jpeg" class="cell photo" alt="h11">
            <img src="images/4.jpeg" class="cell photo" alt="h12">

            <div class="cell empty"></div>
            <img src="images/1.jpeg" class="cell photo" alt="h13">
            <img src="images/2.jpeg" class="cell photo" alt="h14">
            <img src="images/3.jpeg" class="cell photo" alt="h15">
            <div class="cell empty"></div>

            <div class="cell empty"></div>
            <div class="cell empty"></div>
            <img src="images/4.jpeg" class="cell photo" alt="h16">
            <div class="cell empty"></div>
            <div class="cell empty"></div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
