<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>С Днем Рождения, Малахат!</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <audio id="bg-music" loop>
        <source src="ariana.mp3" type="audio/mpeg">
    </audio>

    <div id="matrix-screen" class="screen active">
        <canvas id="matrix-canvas"></canvas>
        <div id="matrix-content">
            <div id="countdown">3</div>
            <div id="matrix-text" class="hidden">H A P P Y</div>
            <button id="sound-btn">🔊 Включить звук</button>
        </div>
    </div>

    <div id="gallery-screen" class="screen hidden">
        <div class="book-container">
            <div id="book" class="book" onclick="window.turnPage()">
                
                <div class="page cover-page" id="cover">
                    <div class="page-content">
                        <div id="text-cover"></div>
                    </div>
                </div>

                <div class="page" id="p1">
                    <div class="front">
                        <div class="page-content">
                            </div>
                    </div>
                    <div class="back">
                        <div class="page-content">
                            <p id="text-p1-back"></p>
                        </div>
                    </div>
                </div>

                <div class="page" id="p2">
                    <div class="front">
                        <div class="page-content">
                            <p id="text-p2-front"></p>
                        </div>
                    </div>
                    <div class="back">
                        <div class="page-content">
                            <p id="text-p2-back"></p>
                        </div>
                    </div>
                </div>

            </div>
        </div>
    </div>

    <div id="heart-screen" class="screen hidden">
        <div class="heart-container">
            <div class="heart">❤️</div>
            <h1 class="final-title">С праздником, Малахат! 🎉</h1>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
