<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Для Малахат! ❤️</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div id="matrix-screen" class="screen active">
        <canvas id="matrix-canvas"></canvas>
        <div id="matrix-content">
            <div id="matrix-text">H A P P Y</div>
        </div>
    </div>

    <div id="gallery-screen" class="screen hidden">
        <div class="book-container" onclick="turnPage()">
            <div class="book">
                
                <div class="page" id="p1">
                    <div class="front">
                        <img src="images/1.jpeg" alt="Фото 1">
                        <div class="page-footer">Нажми, чтобы открыть 📖</div>
                    </div>
                    <div class="back">
                        <img src="images/2.jpeg" alt="Фото 2">
                        <div class="page-footer">Листаем дальше ➡️</div>
                    </div>
                </div>

                <div class="page" id="p2">
                    <div class="front">
                        <img src="images/3.jpeg" alt="Фото 3">
                        <div class="page-footer">Нажми еще раз ➡️</div>
                    </div>
                    <div class="back">
                        <img src="images/4.jpeg" alt="Фото 4">
                        <div class="page-footer font-suprise">Открыть сюрприз ❤️</div>
                    </div>
                </div>

            </div>
        </div>
    </div>

    <div id="heart-screen" class="screen hidden">
        <h2>Мое сердце принадлежит тебе ❤️</h2>
        <div class="heart-collage">
            <img src="images/1.jpeg" alt="1">
            <img src="images/2.jpeg" alt="2">
            <img src="images/3.jpeg" alt="3">
            <img src="images/4.jpeg" alt="4">
            <img src="images/3.jpeg" alt="3-dub">
            <img src="images/4.jpeg" alt="4-dub">
            <img src="images/1.jpeg" alt="1-dub">
            <img src="images/2.jpeg" alt="2-dub">
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
