<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Для Малахат! ❤️</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div id="matrix-screen" class="screen active">
        <canvas id="matrix-canvas"></canvas>
        <div id="matrix-content">
            <div id="countdown">3</div>
            <div id="matrix-text" class="hidden">H A P P Y</div>
        </div>
    </div>

    <div id="gallery-screen" class="screen hidden">
        <div class="book-container">
            <div class="book" id="book" onclick="turnPage()">
                
                <div class="page" id="p1">
                    <div class="front">
                        <div class="page-content">
                            <img src="images/1.jpeg" alt="Фото 1">
                        </div>
                        <div class="page-footer">Нажми, чтобы открыть 📖</div>
                    </div>
                    <div class="back">
                        <div class="page-content">
                            <img src="images/2.jpeg" alt="Фото 2">
                        </div>
                        <div class="page-footer">Листаем дальше ➡️</div>
                    </div>
                </div>

                <div class="page" id="p2">
                    <div class="front">
                        <div class="page-content">
                            <img src="images/3.jpeg" alt="Фото 3">
                        </div>
                        <div class="page-footer">Еще один клик ➡️</div>
                    </div>
                    <div class="back">
                        <div class="page-content">
                            <img src="images/4.jpeg" alt="Фото 4">
                        </div>
                        <div class="page-footer font-surprise">Посмотреть сюрприз ❤️</div>
                    </div>
                </div>

            </div>
        </div>
    </div>

    <div id="heart-screen" class="screen hidden">
        
        <div class="stars-layer stars-1"></div>
        <div class="stars-layer stars-2"></div>
        <div class="stars-layer stars-3"></div>

        <h2 class="glow-text">Мое сердце принадлежит тебе ❤️</h2>
        
        <div class="heart-wrap">
            <div class="photo-cell p1"><img src="images/1.jpeg" alt="h1"></div>
            <div class="photo-cell p2"><img src="images/2.jpeg" alt="h2"></div>
            <div class="photo-cell p3"><img src="images/3.jpeg" alt="h3"></div>
            <div class="photo-cell p4"><img src="images/4.jpeg" alt="h4"></div>
            
            <div class="photo-cell p5"><img src="images/1.jpeg" alt="h5"></div>
            <div class="photo-cell p6"><img src="images/2.jpeg" alt="h6"></div>
            <div class="photo-cell p7"><img src="images/3.jpeg" alt="h7"></div>
            <div class="photo-cell p8"><img src="images/4.jpeg" alt="h8"></div>
            
            <div class="photo-cell p9"><img src="images/1.jpeg" alt="h9"></div>
            <div class="photo-cell p10"><img src="images/2.jpeg" alt="h10"></div>
            <div class="photo-cell p11"><img src="images/3.jpeg" alt="h11"></div>
            <div class="photo-cell p12"><img src="images/4.jpeg" alt="h12"></div>
            
            <div class="photo-cell p13"><img src="images/1.jpeg" alt="h13"></div>
            <div class="photo-cell p14"><img src="images/2.jpeg" alt="h14"></div>
            <div class="photo-cell p15"><img src="images/3.jpeg" alt="h15"></div>
            <div class="photo-cell p16"><img src="images/4.jpeg" alt="h16"></div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
